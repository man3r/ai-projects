<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00C853;
            --primary-dark: #00A043;
            --accent: #FF6F00;
            --bg: #FFFFFF;
            --surface: #F5F5F5;
            --text: #37474F;
            --text-light: #616161;
            --border: #E0E0E0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--surface);
            color: var(--text);
        }

        .header {
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-button {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .cart-section {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .item-unit {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--surface);
            padding: 0.5rem;
            border-radius: 25px;
        }

        .qty-button {
            background: white;
            border: 1px solid var(--border);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .qty-button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .quantity {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .item-price {
            font-weight: 700;
            color: var(--primary);
            min-width: 80px;
            text-align: right;
        }

        .summary {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 1.05rem;
        }

        .summary-row.total {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid var(--border);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkout-button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .checkout-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .checkout-button:disabled {
            background: var(--text-light);
            cursor: not-allowed;
            transform: none;
        }

        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-cart-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .continue-shopping {
            margin-top: 1.5rem;
            background: var(--primary);
            color: white;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .success-screen {
            display: none;
            text-align: center;
            padding: 3rem;
        }

        .success-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .item-controls {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <button class="back-button" onclick="goBack()">← Back</button>
            <h1>Your Cart</h1>
            <div></div>
        </div>
    </header>

    <div class="container">
        <div id="cartView">
            <div class="cart-section">
                <h2>🛒 Items in Cart</h2>
                <div id="cartItems"></div>
                
                <div class="summary" id="summary" style="display: none;">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Fee</span>
                        <span id="deliveryFee">₹0</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total">₹0</span>
                    </div>
                </div>
            </div>

            <div class="cart-section" id="checkoutForm" style="display: none;">
                <h2>📍 Delivery Details</h2>
                
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" id="customerName" placeholder="Your name" required>
                </div>

                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="customerPhone" placeholder="+91 98765 43210" required>
                </div>

                <div class="form-group">
                    <label>Delivery Address *</label>
                    <textarea id="deliveryAddress" placeholder="Full address with landmark" required></textarea>
                </div>

                <div class="form-group">
                    <label>Delivery Instructions (Optional)</label>
                    <input type="text" id="deliveryInstructions" placeholder="e.g., Ring bell twice">
                </div>

                <div class="form-group">
                    <label>Special Notes (Optional)</label>
                    <textarea id="customerNotes" placeholder="Any special requests..."></textarea>
                </div>

                <button class="checkout-button" onclick="placeOrder()">
                    Place Order - <span id="totalAmount">₹0</span>
                </button>
            </div>
        </div>

        <div id="successView" class="success-screen">
            <div class="success-icon">🎉</div>
            <h1>Order Placed Successfully!</h1>
            <p style="margin: 1rem 0; color: var(--text-light); font-size: 1.1rem;">
                Order #<span id="orderNumber"></span>
            </p>
            <p style="margin-bottom: 2rem;">We'll start preparing your order right away!</p>
            <button class="checkout-button" onclick="trackOrder()">Track Order</button>
            <button class="continue-shopping" onclick="continueShopping()">Continue Shopping</button>
        </div>
    </div>

    <script>
        const slug = window.location.pathname.split('/')[2];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let businessSettings = {};

        document.addEventListener('DOMContentLoaded', () => {
            loadBusinessSettings();
            renderCart();
        });

        async function loadBusinessSettings() {
            // Load business settings for delivery fee calculation
            try {
                const response = await fetch(`/store/${slug}/products`);
                const data = await response.json();
                businessSettings = data.business || {};
                calculateTotal();
            } catch (error) {
                console.error('Error loading business settings:', error);
            }
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <h3>Your cart is empty</h3>
                        <p>Add some delicious items to get started!</p>
                        <button class="continue-shopping" onclick="continueShopping()">
                            Continue Shopping
                        </button>
                    </div>
                `;
                document.getElementById('summary').style.display = 'none';
                document.getElementById('checkoutForm').style.display = 'none';
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-unit">${item.unit || ''}</div>
                    </div>
                    <div class="item-controls">
                        <div class="quantity-control">
                            <button class="qty-button" onclick="updateQuantity(${index}, -1)">−</button>
                            <span class="quantity">${item.quantity}</span>
                            <button class="qty-button" onclick="updateQuantity(${index}, 1)">+</button>
                        </div>
                        <div class="item-price">₹${(item.price * item.quantity).toFixed(2)}</div>
                    </div>
                </div>
            `).join('');

            document.getElementById('summary').style.display = 'block';
            document.getElementById('checkoutForm').style.display = 'block';
            calculateTotal();
        }

        function updateQuantity(index, change) {
            cart[index].quantity += change;
            
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function calculateTotal() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            let deliveryFee = businessSettings.delivery_fee || 0;
            if (subtotal >= (businessSettings.free_delivery_above || 999999)) {
                deliveryFee = 0;
            }
            
            const total = subtotal + deliveryFee;

            document.getElementById('subtotal').textContent = `₹${subtotal.toFixed(2)}`;
            document.getElementById('deliveryFee').textContent = deliveryFee === 0 ? 'FREE' : `₹${deliveryFee.toFixed(2)}`;
            document.getElementById('total').textContent = `₹${total.toFixed(2)}`;
            document.getElementById('totalAmount').textContent = `₹${total.toFixed(2)}`;
        }

        async function placeOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('deliveryAddress').value.trim();
            
            if (!name || !phone || !address) {
                alert('Please fill in all required fields');
                return;
            }

            const orderData = {
                items: cart.map(item => ({
                    product_id: item.id,
                    quantity: item.quantity
                })),
                customer_phone: phone,
                customer_name: name,
                delivery_address: {
                    address: address
                },
                delivery_instructions: document.getElementById('deliveryInstructions').value,
                customer_notes: document.getElementById('customerNotes').value
            };

            try {
                const response = await fetch(`/store/${slug}/orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(orderData)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // Clear cart
                    cart = [];
                    localStorage.setItem('cart', JSON.stringify(cart));

                    // Show success screen
                    document.getElementById('cartView').style.display = 'none';
                    document.getElementById('successView').style.display = 'block';
                    document.getElementById('orderNumber').textContent = result.order_number;
                    
                    // Save order number for tracking
                    localStorage.setItem('lastOrderNumber', result.order_number);
                } else {
                    alert('Error placing order: ' + (result.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Order error:', error);
                alert('Failed to place order. Please try again.');
            }
        }

        function trackOrder() {
            const orderNumber = localStorage.getItem('lastOrderNumber');
            window.location.href = `/store/${slug}/orders/${orderNumber}`;
        }

        function continueShopping() {
            window.location.href = `/store/${slug}`;
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
