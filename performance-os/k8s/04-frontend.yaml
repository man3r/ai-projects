---
# ─── Deployment: React + Nginx frontend ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: performance-os
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: performance-os-frontend:v1.0
          imagePullPolicy: IfNotPresent  # Change to Always when using a registry
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

---
# ─── Service: Frontend internal access ────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: performance-os
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
