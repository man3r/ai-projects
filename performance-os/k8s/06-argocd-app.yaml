apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: performance-os
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/man3r/ai-projects.git'
    path: performance-os/k8s
    targetRevision: temp_main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: performance-os
  syncPolicy:
    automated:
      prune: true      # Automatically delete K8s resources if you delete their YAML files in Git
      selfHeal: true   # Automatically revert any manual changes made via kubectl back to what is in Git
    syncOptions:
      - CreateNamespace=true
