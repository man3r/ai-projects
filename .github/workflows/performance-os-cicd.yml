name: CI/CD — Performance OS

# Trigger on pushes to main that touch anything inside performance-os/
on:
  push:
    branches: [main, temp_main]
    paths:
      - "performance-os/**"
      - ".github/workflows/performance-os-cicd.yml"
  pull_request:
    branches: [main]
    paths:
      - "performance-os/**"
  workflow_dispatch:  # Allows manual triggering from GitHub UI

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/performance-os-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/performance-os-frontend

jobs:
  # ─── Job 1: Validate the code builds cleanly ─────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: performance-os

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: performance-os/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate FastAPI app imports correctly
        run: python -c "from app.main import app; print('✅ Backend OK')"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: performance-os/frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: performance-os/frontend
        run: npm ci

      - name: Build React frontend
        working-directory: performance-os/frontend
        run: npm run build

  # ─── Job 2: Build and push Docker images to GHCR ─────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    # Only push images on actual commits to main/temp_main, not PRs
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ──
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./performance-os
          file: ./performance-os/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ──
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./performance-os/frontend
          file: ./performance-os/frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Output deploy instructions ───────────────────────────────────────
  deploy-instructions:
    name: Deploy Instructions
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Print rollout commands
        run: |
          echo "## 🚀 New images published to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run these commands on your local machine to deploy:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo "kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo "kubectl rollout status deployment/backend -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo "kubectl rollout status deployment/frontend -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
