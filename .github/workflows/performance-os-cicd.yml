name: CI/CD — Performance OS

on:
  push:
    branches: [main, temp_main]
    paths:
      - "performance-os/**"
      - ".github/workflows/performance-os-cicd.yml"
  pull_request:
    branches: [main]
    paths:
      - "performance-os/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/performance-os-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/performance-os-frontend

jobs:
  # ─── Job 1: Validate the code builds cleanly ─────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: performance-os

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: performance-os/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate FastAPI app imports
        run: python -c "from app.main import app; print('✅ Backend OK')"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: performance-os/frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: performance-os/frontend
        run: npm ci

      - name: Build React frontend
        working-directory: performance-os/frontend
        run: npm run build

  # ─── Job 2: Build and push ARM64 images to GHCR ───────────────────────────────
  # Runs on a native ARM64 runner — no QEMU, no cross-compilation.
  # Targets Docker Desktop on Apple Silicon (M1/M2/M3/M4).
  build-and-push:
    name: Build & Push (linux/arm64)
    runs-on: ubuntu-24.04-arm
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./performance-os
          file: ./performance-os/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend-arm64
          cache-to: type=gha,scope=backend-arm64,mode=max

      - name: Build and push frontend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./performance-os/frontend
          file: ./performance-os/frontend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend-arm64
          cache-to: type=gha,scope=frontend-arm64,mode=max

  # ─── Job 3: Output deploy instructions ───────────────────────────────────────
  deploy-instructions:
    name: Deploy Instructions
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Print rollout commands
        run: |
          echo "## 🚀 New ARM64 images published to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run these commands on your local machine to deploy:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo "kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo "kubectl rollout status deployment/backend -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo "kubectl rollout status deployment/frontend -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
