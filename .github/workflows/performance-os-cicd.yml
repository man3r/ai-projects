name: CI/CD — Performance OS

on:
  push:
    branches: [main, temp_main]
    paths:
      - "performance-os/**"
      - ".github/workflows/performance-os-cicd.yml"
  pull_request:
    branches: [main]
    paths:
      - "performance-os/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/performance-os-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/performance-os-frontend

jobs:
  # ─── Job 1: Validate the code builds cleanly ─────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: performance-os

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: performance-os/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate FastAPI app imports
        run: python -c "from app.main import app; print('✅ Backend OK')"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: performance-os/frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: performance-os/frontend
        run: npm ci

      - name: Build React frontend
        working-directory: performance-os/frontend
        run: npm run build

  # ─── Job 2: Build each platform natively in parallel ─────────────────────────
  # Strategy: Build amd64 on an amd64 runner + arm64 on a native arm64 runner
  # simultaneously, then merge into a single multi-arch manifest.
  # This eliminates QEMU cross-compilation — the main source of slowness.
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm  # Native ARM64 runner — no QEMU needed

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Sanitize platform name for use in cache keys (linux/arm64 → linux-arm64)
      - name: Prepare platform tag
        id: platform
        run: echo "tag=$(echo ${{ matrix.platform }} | tr '/' '-')" >> $GITHUB_OUTPUT

      # ── Backend ──
      - name: Build backend (${{ matrix.platform }})
        uses: docker/build-push-action@v5
        with:
          context: ./performance-os
          file: ./performance-os/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.BACKEND_IMAGE }}:${{ steps.platform.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha,scope=backend-${{ steps.platform.outputs.tag }}
          cache-to: type=gha,scope=backend-${{ steps.platform.outputs.tag }},mode=max

      # ── Frontend ──
      - name: Build frontend (${{ matrix.platform }})
        uses: docker/build-push-action@v5
        with:
          context: ./performance-os/frontend
          file: ./performance-os/frontend/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.FRONTEND_IMAGE }}:${{ steps.platform.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha,scope=frontend-${{ steps.platform.outputs.tag }}
          cache-to: type=gha,scope=frontend-${{ steps.platform.outputs.tag }},mode=max

  # ─── Job 3: Merge platform images into a single multi-arch manifest ───────────
  merge-manifests:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge backend manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.BACKEND_IMAGE }}:latest \
            --tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            ${{ env.BACKEND_IMAGE }}:linux-amd64-${{ github.sha }} \
            ${{ env.BACKEND_IMAGE }}:linux-arm64-${{ github.sha }}

      - name: Merge frontend manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.FRONTEND_IMAGE }}:latest \
            --tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            ${{ env.FRONTEND_IMAGE }}:linux-amd64-${{ github.sha }} \
            ${{ env.FRONTEND_IMAGE }}:linux-arm64-${{ github.sha }}

  # ─── Job 4: Output deploy instructions ───────────────────────────────────────
  deploy-instructions:
    name: Deploy Instructions
    runs-on: ubuntu-latest
    needs: merge-manifests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Print rollout commands
        run: |
          echo "## 🚀 New images published to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run these commands on your local machine to deploy:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo "kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo "kubectl rollout status deployment/backend -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo "kubectl rollout status deployment/frontend -n performance-os" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
