name: CI/CD — Performance OS

on:
  push:
    branches: [main, temp_main]
    paths:
      - "performance-os/**"
      - ".github/workflows/performance-os-cicd.yml"
  pull_request:
    branches: [main]
    paths:
      - "performance-os/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/performance-os-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/performance-os-frontend

jobs:
  # ─── Job 1: Validate the code builds cleanly ─────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: performance-os

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: performance-os/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate FastAPI app imports
        run: python -c "from app.main import app; print('✅ Backend OK')"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: performance-os/frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: performance-os/frontend
        run: npm ci

      - name: Build React frontend
        working-directory: performance-os/frontend
        run: npm run build

  # ─── Job 2: Build and push ARM64 images to GHCR ───────────────────────────────
  # Runs on a native ARM64 runner — no QEMU, no cross-compilation.
  # Targets Docker Desktop on Apple Silicon (M1/M2/M3/M4).
  build-and-push:
    name: Build & Push (linux/arm64)
    runs-on: ubuntu-24.04-arm
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./performance-os
          file: ./performance-os/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend-arm64
          cache-to: type=gha,scope=backend-arm64,mode=max

      - name: Build and push frontend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./performance-os/frontend
          file: ./performance-os/frontend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend-arm64
          cache-to: type=gha,scope=frontend-arm64,mode=max

  # ─── Job 3: Update GitOps Manifests ──────────────────────────────────────────
  update-gitops:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write  # Needed to push commits back to the repo

    steps:
      - uses: actions/checkout@v4
        with:
          # Ensure we fetch the branch we're actually running on
          ref: ${{ github.ref_name }}

      - name: Update K8s image tags
        run: |
          # Replace the image lines with the exact new SHA
          sed -i "s|image: ghcr.io/.*/performance-os-backend.*|image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" performance-os/k8s/03-backend.yaml
          sed -i "s|image: ghcr.io/.*/performance-os-frontend.*|image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" performance-os/k8s/04-frontend.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add performance-os/k8s/03-backend.yaml performance-os/k8s/04-frontend.yaml
          # Use [skip ci] so this commit doesn't trigger another infinity loop of pipeline runs
          git commit -m "chore(gitops): update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin ${{ github.ref_name }}
